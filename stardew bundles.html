<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星露谷社区中心 · 捐赠进度</title>
<style>
  :root{
    --bg: #2b1d12;
    --paper: #f4e4c1;
    --paper-dark: #e8d3a3;
    --card: #fdf6e3;
    --brown: #6b4226;
    --brown-dark: #4a2c17;
    --green: #4a7c3f;
    --green-dark: #345a2c;
    --gold: #c9902a;
    --red: #b5482f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(180deg, #1a2f1a 0%, #2b1d12 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--brown-dark);
    min-height: 100vh;
  }
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--brown-dark);
    color: var(--paper);
    padding: 14px 16px 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    border-bottom: 3px solid var(--gold);
  }
  .header h1 {
    margin: 0 0 8px;
    font-size: 19px;
    text-align: center;
    letter-spacing: 2px;
  }
  .progress-wrap {
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    height: 22px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6fae4a, #4a7c3f);
    transition: width 0.4s ease;
    border-radius: 20px;
  }
  .progress-text {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 12px 0;
    background: var(--brown-dark);
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 8px 14px;
    background: rgba(255,255,255,0.08);
    color: var(--paper);
    border-radius: 10px 10px 0 0;
    font-size: 13px;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.1);
    border-bottom: none;
  }
  .tab.active {
    background: var(--paper);
    color: var(--brown-dark);
    font-weight: bold;
  }
  .container {
    padding: 14px 12px 40px;
    max-width: 640px;
    margin: 0 auto;
  }
  .room-title {
    font-size: 20px;
    font-weight: bold;
    color: var(--gold);
    text-align: center;
    margin: 6px 0 14px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    letter-spacing: 4px;
  }
  .bundle-card {
    background: var(--card);
    border: 3px solid var(--paper-dark);
    border-radius: 14px;
    margin-bottom: 14px;
    padding: 14px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.25);
    position: relative;
  }
  .bundle-card.done {
    background: #e4f2df;
    border-color: #8fbf7a;
  }
  .bundle-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .bundle-name {
    font-size: 16px;
    font-weight: bold;
    color: var(--brown);
  }
  .bundle-need {
    font-size: 12px;
    color: #888;
    background: rgba(0,0,0,0.06);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .bundle-need.ok {
    background: var(--green);
    color: #fff;
  }
  .item-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    background: rgba(0,0,0,0.03);
  }
  .item-row.checked {
    background: rgba(74,124,63,0.12);
  }
  .item-check {
    width: 24px;
    height: 24px;
    flex: 0 0 24px;
    border-radius: 6px;
    border: 2px solid var(--brown);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: transparent;
    margin-top: 2px;
  }
  .item-row.checked .item-check {
    background: var(--green);
    border-color: var(--green-dark);
    color: #fff;
  }
  .item-info {
    flex: 1;
    min-width: 0;
  }
  .item-name {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--brown-dark);
  }
  .item-meta {
    font-size: 12px;
    color: #7a6a52;
    margin-top: 2px;
    line-height: 1.5;
  }
  .item-meta b {
    color: var(--brown);
  }
  .reward-box {
    margin-top: 10px;
    padding: 8px 10px;
    background: linear-gradient(90deg, #fff3d0, #ffe6a8);
    border-radius: 8px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid #e0bd6a;
  }
  .reward-box .label {
    font-weight: bold;
    color: var(--gold);
    flex: 0 0 auto;
  }
  .choose-hint {
    font-size: 11.5px;
    color: var(--red);
    background: rgba(181,72,47,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
    display: inline-block;
  }
  .footer-stats {
    margin-top: 20px;
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    padding: 10px;
  }
  .reset-btn {
    position: fixed;
    right: 14px;
    bottom: 14px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    font-size: 18px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    z-index: 20;
  }
</style>
</head>

      name: "夜间垂钓收集包", mode: "all",
      items: [
        {name:"大眼鱼", get:"河流", time:"午12-凌晨2", season:"秋", weather:"雨天"},
        {name:"鲷鱼", get:"河流", time:"晚6-凌晨2", season:"不限", weather:"不限"},
        {name:"鳗鱼", get:"海洋", time:"晚4-凌晨2", season:"春秋", weather:"雨天"},
      ],
      reward: "小型光辉戒指 ×1"
    },
    {
      name: "蟹笼收集包", mode: "choose", need: 5,
      items: [
        {name:"小龙虾", get:"蟹笼（淡水）"},
        {name:"蜗牛", get:"蟹笼（淡水）"},
        {name:"玉黍螺", get:"蟹笼（淡水）"},
        {name:"龙虾", get:"蟹笼（海洋）"},
        {name:"螃蟹", get:"蟹笼（海洋）"},
        {name:"鸟蛤", get:"蟹笼（海洋）、可通过沙滩觅食"},
        {name:"蚌", get:"蟹笼（海洋）、可通过沙滩觅食"},
        {name:"虾", get:"蟹笼（海洋）"},
        {name:"牡蛎", get:"蟹笼（海洋）、可通过沙滩觅食（图片信息不完整，具体是否属于此选项池请自行核对游戏内弹窗）"},
        {name:"蛤", get:"蟹笼（海洋）、可通过沙滩觅食（图片信息不完整，具体是否属于此选项池请自行核对游戏内弹窗）"},
      ],
      reward: "蟹笼 ×3"
    },
  ],
};

// ============ 状态 ============
const STORAGE_KEY = "sdv_bundle_progress_v1";
let state = {};
try {
  state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
} catch(e) { state = {}; }

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function itemKey(room, bIdx, iIdx) {
  return room + "|" + bIdx + "|" + iIdx;
}

let currentRoom = Object.keys(DATA)[0];

// ============ 渲染 ============
function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  Object.keys(DATA).forEach(room => {
    const el = document.createElement("div");
    el.className = "tab" + (room === currentRoom ? " active" : "");
    el.textContent = room;
    el.onclick = () => { currentRoom = room; renderAll(); };
    tabsEl.appendChild(el);
  });
}

function isBundleDone(room, bIdx, bundle) {
  let count = 0;
  bundle.items.forEach((it, iIdx) => {
    if (state[itemKey(room, bIdx, iIdx)]) count++;
  });
  if (bundle.mode === "choose") return count >= bundle.need;
  return count >= bundle.items.length;
}

function renderRoom() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  const title = document.createElement("div");
  title.className = "room-title";
  title.textContent = currentRoom;
  container.appendChild(title);

  DATA[currentRoom].forEach((bundle, bIdx) => {
    const done = isBundleDone(currentRoom, bIdx, bundle);
    const card = document.createElement("div");
    card.className = "bundle-card" + (done ? " done" : "");

    let checkedCount = 0;
    bundle.items.forEach((it, iIdx) => {
      if (state[itemKey(currentRoom, bIdx, iIdx)]) checkedCount++;
    });

    const needLabel = bundle.mode === "choose"
      ? `${checkedCount} / ${bundle.need}（${bundle.items.length}选${bundle.need}）`
      : `${checkedCount} / ${bundle.items.length}`;

    card.innerHTML = `
      <div class="bundle-head">
        <div class="bundle-name">${done ? "✅ " : ""}${bundle.name}</div>
        <div class="bundle-need ${done ? "ok" : ""}">${needLabel}</div>
      </div>
    `;

    if (bundle.mode === "choose") {
      const hint = document.createElement("div");
      hint.className = "choose-hint";
      hint.textContent = `任选 ${bundle.need} 种即可完成`;
      card.appendChild(hint);
    }

    const list = document.createElement("div");
    list.className = "item-list";

    bundle.items.forEach((it, iIdx) => {
      const key = itemKey(currentRoom, bIdx, iIdx);
      const checked = !!state[key];
      const row = document.createElement("div");
      row.className = "item-row" + (checked ? " checked" : "");

      let metaParts = [];
      if (it.get) metaParts.push(`<b>获取：</b>${it.get}`);
      if (it.time) metaParts.push(`<b>时间：</b>${it.time}`);
      if (it.season) metaParts.push(`<b>季节：</b>${it.season}`);
      if (it.weather) metaParts.push(`<b>天气：</b>${it.weather}`);

      row.innerHTML = `
        <div class="item-check">${checked ? "✓" : ""}</div>
        <div class="item-info">
          <div class="item-name">${it.name}</div>
          <div class="item-meta">${metaParts.join(" ｜ ")}</div>
        </div>
      `;
      row.onclick = () => {
        state[key] = !state[key];
        save();
        renderAll();
      };
      list.appendChild(row);
    });

    card.appendChild(list);

    const rewardBox = document.createElement("div");
    rewardBox.className = "reward-box";
    rewardBox.innerHTML = `<span class="label">🎁 奖励：</span><span>${bundle.reward}</span>`;
    card.appendChild(rewardBox);

    container.appendChild(card);
  });

  const stats = document.createElement("div");
  stats.className = "footer-stats";
  stats.textContent = "点击每一项来勾选／取消勾选，数据自动保存在本机浏览器中";
  container.appendChild(stats);
}

function renderProgress() {
  let totalBundles = 0, doneBundles = 0;
  Object.keys(DATA).forEach(room => {
    DATA[room].forEach((bundle, bIdx) => {
      totalBundles++;
      if (isBundleDone(room, bIdx, bundle)) doneBundles++;
    });
  });
  const pct = totalBundles ? Math.round((doneBundles / totalBundles) * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${doneBundles} / ${totalBundles} 个礼包 (${pct}%)`;
}

function renderAll() {
  renderTabs();
  renderRoom();
  renderProgress();
}

function resetAll() {
  if (confirm("确定要清空所有勾选记录吗？此操作不可撤销。")) {
    state = {};
    save();
    renderAll();
  }
}

renderAll();
</script>
