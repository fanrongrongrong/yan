<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>顶流之路 · 爱豆模拟器</title>
<style>
:root{
  --bg:#0a0612; --panel:#160f24; --panel2:#1e1435; --ink:#f4ecff;
  --dim:#9d8fc4; --line:#2f2350;
  --neon:#ff2d78; --neon2:#00e5ff; --gold:#ffd24a; --lime:#c6ff4a;
  --danger:#ff4d5e; --ok:#3ddc97;
  --news:#ff2d78;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
body{max-width:520px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}

/* ===== 头条滚动条 ===== */
.ticker{position:sticky;top:0;z-index:40;background:linear-gradient(90deg,var(--neon),#b3006b);
  display:flex;align-items:center;height:30px;font-size:12px;font-weight:800;letter-spacing:.5px;overflow:hidden;box-shadow:0 2px 14px #ff2d7855}
.ticker .tag{background:#000;color:#fff;padding:0 9px;height:100%;display:flex;align-items:center;flex:none;font-style:italic;letter-spacing:2px}
.ticker .track{white-space:nowrap;animation:scroll 18s linear infinite;padding-left:100%}
@keyframes scroll{to{transform:translateX(-100%)}}

/* ===== 顶部身份 ===== */
.hud{padding:14px 16px 8px;background:radial-gradient(120% 100% at 0% 0%,#2a1550 0%,transparent 60%),var(--panel)}
.name-row{display:flex;align-items:center;gap:10px}
.avatar{width:46px;height:46px;border-radius:14px;flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;
  background:linear-gradient(135deg,var(--neon),var(--neon2));box-shadow:0 0 18px #ff2d7866}
.who h1{font-size:19px;font-weight:900;letter-spacing:.5px;line-height:1.1}
.who .tier{font-size:11px;color:var(--gold);font-weight:800;letter-spacing:1px;margin-top:3px}
.who .tier b{color:var(--dim);font-weight:600}

/* ===== 统计卡片 ===== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:12px 16px 6px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;position:relative;overflow:hidden}
.stat .k{font-size:9px;color:var(--dim);letter-spacing:.5px;font-weight:700}
.stat .v{font-size:15px;font-weight:900;margin-top:2px}
.stat.fans .v{color:var(--neon)} .stat.buzz .v{color:var(--neon2)}
.stat.rep .v{color:var(--lime)} .stat.money .v{color:var(--gold)}
.bars{padding:2px 16px 4px}
.bar-line{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:11px;font-weight:700;color:var(--dim)}
.bar-line .lbl{width:52px;flex:none}
.bar-out{flex:1;height:9px;background:#241a3d;border-radius:6px;overflow:hidden;position:relative}
.bar-in{height:100%;border-radius:6px;transition:width .5s}
.bar-in.mood{background:linear-gradient(90deg,#ffd24a,#ff9e4a)}
.bar-in.black{background:linear-gradient(90deg,#7a2fff,#ff2d78)}
.bar-line .num{width:34px;text-align:right;color:var(--ink)}

/* ===== 主区域 ===== */
.stage{padding:6px 16px 120px}
.week-pill{display:inline-flex;align-items:center;gap:6px;background:#000;border:1px solid var(--line);
  border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;color:var(--neon2);letter-spacing:1px;margin:4px 0 12px}

/* 事件卡 */
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:18px;padding:16px;box-shadow:0 8px 30px #0008;animation:pop .35s cubic-bezier(.2,1.2,.4,1)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.card .etag{display:inline-block;font-size:10px;font-weight:900;letter-spacing:1.5px;padding:3px 10px;border-radius:8px;margin-bottom:10px}
.etag.hot{background:#ff2d7822;color:var(--neon);border:1px solid #ff2d7855}
.etag.biz{background:#ffd24a22;color:var(--gold);border:1px solid #ffd24a55}
.etag.crisis{background:#ff4d5e22;color:var(--danger);border:1px solid #ff4d5e55}
.etag.fan{background:#00e5ff22;color:var(--neon2);border:1px solid #00e5ff55}
.etag.life{background:#c6ff4a22;color:var(--lime);border:1px solid #c6ff4a55}
.card h2{font-size:17px;font-weight:900;line-height:1.35;margin-bottom:8px}
.card .desc{font-size:13.5px;line-height:1.65;color:#d8ccf5}
.card .desc .hl{color:var(--neon2);font-weight:800}

/* 选项 */
.choices{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.choice{background:#0d0820;border:1px solid var(--line);border-radius:14px;padding:12px 14px;
  font-size:13.5px;font-weight:700;color:var(--ink);text-align:left;cursor:pointer;transition:.15s;position:relative;line-height:1.4}
.choice:active{transform:scale(.98)}
.choice:hover{border-color:var(--neon);background:#1a0f2e}
.choice .cs{font-size:10px;color:var(--dim);font-weight:600;display:block;margin-top:3px}
.choice .lock{color:var(--danger)}

/* 结果反馈 */
.result{margin-top:14px;background:#0d0820;border:1px dashed var(--line);border-radius:14px;padding:14px;animation:pop .3s}
.result .rtitle{font-size:13px;font-weight:900;margin-bottom:8px;letter-spacing:.5px}
.result .deltas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px}
.chip.up{background:#3ddc9722;color:var(--ok)}
.chip.down{background:#ff4d5e22;color:var(--danger)}
.result .rdesc{font-size:12.5px;line-height:1.6;color:#c8bce8}
.next-btn{margin-top:12px;width:100%;background:linear-gradient(90deg,var(--neon),var(--neon2));
  border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 20px #ff2d7844}
.next-btn:active{transform:scale(.98)}

/* 行动菜单 */
.actions-title{font-size:12px;font-weight:900;color:var(--dim);letter-spacing:2px;margin:2px 0 10px}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.act{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:14px 12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.act:active{transform:scale(.97)}
.act:hover{border-color:var(--neon2)}
.act .ico{font-size:26px;margin-bottom:6px}
.act .an{font-size:14px;font-weight:900}
.act .ad{font-size:10.5px;color:var(--dim);margin-top:3px;line-height:1.4}
.act .cost{position:absolute;top:8px;right:10px;font-size:10px;font-weight:800;color:var(--gold)}
.act.disabled{opacity:.4;pointer-events:none}

/* 顶部弹幕/超话按钮 */
.fandom-btn{position:fixed;bottom:20px;right:calc(50% - 250px);z-index:30}
@media(max-width:520px){.fandom-btn{right:16px}}
.fandom-btn button{background:linear-gradient(135deg,var(--neon2),#0088ff);border:none;width:56px;height:56px;border-radius:50%;
  font-size:24px;box-shadow:0 6px 24px #00e5ff66;cursor:pointer;color:#fff}

/* 弹窗 */
.modal{position:fixed;inset:0;z-index:60;background:#000c;display:none;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
.modal.on{display:flex}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto}
.sheet h3{font-size:17px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sheet .close{margin-top:14px;width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--ink);font-weight:800;cursor:pointer}

/* 超话动态 */
.weibo{background:#0d0820;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
.weibo .u{font-size:12px;font-weight:800;color:var(--neon2)}
.weibo .u .v{color:var(--gold);font-size:10px}
.weibo .t{font-size:12.5px;line-height:1.5;margin-top:4px;color:#d8ccf5}
.weibo .m{font-size:10px;color:var(--dim);margin-top:6px;display:flex;gap:14px}

/* 开场 */
.intro{padding:40px 24px;text-align:center}
.intro .logo{font-size:13px;letter-spacing:4px;color:var(--neon2);font-weight:800}
.intro h1{font-size:34px;font-weight:900;margin:8px 0 4px;background:linear-gradient(90deg,var(--neon),var(--gold),var(--neon2));
  -webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px}
.intro .sub{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:26px}
.field{text-align:left;margin-bottom:16px}
.field label{font-size:12px;font-weight:800;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:7px}
.field input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px;color:var(--ink);font-size:15px;font-weight:700}
.field input:focus{outline:none;border-color:var(--neon)}
.gender-row{display:flex;gap:8px}
.gender-row .g{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;font-size:13px;font-weight:800;cursor:pointer;transition:.15s}
.gender-row .g.sel{border-color:var(--neon);background:#ff2d7822;color:var(--neon)}
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.concept{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px;cursor:pointer;transition:.15s;text-align:left}
.concept.sel{border-color:var(--gold);background:#ffd24a15}
.concept .cn{font-size:13px;font-weight:900}
.concept .cd{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.4}
.start-btn{width:100%;background:linear-gradient(90deg,var(--neon),var(--neon2));border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:2px;margin-top:8px;box-shadow:0 8px 26px #ff2d7855}
.start-btn:active{transform:scale(.98)}

/* 结局 */
.ending{padding:50px 24px;text-align:center;animation:fade .6s}
.ending .em{font-size:64px;margin-bottom:10px}
.ending h1{font-size:28px;font-weight:900;margin-bottom:6px}
.ending .etag2{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--gold);margin-bottom:20px}
.ending .story{font-size:14px;line-height:1.8;color:#d8ccf5;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:20px}
.ending .fstats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ending .fstat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
.ending .fstat .fk{font-size:10px;color:var(--dim);font-weight:700}
.ending .fstat .fv{font-size:18px;font-weight:900;color:var(--neon);margin-top:3px}

.toast{position:fixed;top:44px;left:50%;transform:translateX(-50%);z-index:80;background:#000d;border:1px solid var(--neon);
  color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:800;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;top:52px}
</style>
</head>
<body>

<div class="ticker" id="ticker">
  <span class="tag">HOT</span>
  <div class="track" id="tickerTrack">加载中…</div>
</div>

<div id="app"></div>

<div class="fandom-btn" id="fandomBtn" style="display:none">
  <button onclick="openFandom()">💬</button>
</div>

<div class="modal" id="modal">
  <div class="sheet" id="sheetContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   顶流之路 · 爱豆模拟器
   ============================================================ */

const G = {
  name:'', gender:'', genderLabel:'', concept:'', conceptLabel:'',
  week:1,
  fans:5000, buzz:10, rep:50, money:20, // 粉丝(人)/话题度/路人缘/资金(万)
  mood:70, black:5, // 心情/黑红值
  tier:0, // 咖位等级
  album:0, drama:0, variety:0, // 作品数
  antifans:0, dispatch:0, // 私生/代拍关注度
  flags:{}, // 剧情标记
  history:[],
  seenEvents:[],
  gameover:false,
};

const TIERS = ['练习生','选秀选手','新人爱豆','当红爱豆','一线顶流','神级偶像'];
const CONCEPTS = {
  vocal:{label:'实力唱将',desc:'唱功炸裂，路人缘高，但话题度慢热',bonus:{rep:15,buzz:-5}},
  visual:{label:'颜值担当',desc:'门面王，话题度拉满，容易被质疑没实力',bonus:{buzz:15,rep:-8}},
  dance:{label:'舞台王者',desc:'舞担台风稳，作品向发展',bonus:{rep:8,fans:20000}},
  variety:{label:'综艺咖',desc:'节目效果好，圈粉快，但被说不务正业',bonus:{fans:40000,rep:-5}},
};

/* ---------- 头条池 ---------- */
const HEADLINES = [
  '#{name}疑似恋情曝光# 阅读量破8亿',
  '某选秀练习生因舞台失误上热搜',
  '娱乐圈又一对夫妻宣布离婚',
  '#顶流{name}新歌打歌# 榜一有变',
  '资本寒冬：三家经纪公司倒闭',
  'AI换脸绯闻满天飞，粉丝集体报警',
  '某代言品牌翻车，代言人紧急解约',
  '选秀节目再爆黑幕，观众要求退钱',
  '#{name}超话签到破纪录#',
  '代拍私生猖獗，机场安保升级',
  '某综艺剪辑引众怒，节目组道歉',
  '偶像塌房产业链曝光，一夜脱粉百万',
];

/* ---------- 主流程状态机 ---------- */
let currentEvent = null;

/* ==================== 初始化 ==================== */
function init(){
  renderIntro();
  startTicker();
}

function startTicker(){
  const track = document.getElementById('tickerTrack');
  function refresh(){
    const h = HEADLINES[Math.floor(Math.random()*HEADLINES.length)]
      .replace(/{name}/g, G.name||'新星');
    track.textContent = '  ★  '+h+'  ★  娱乐头条实时播报  ★  '+
      HEADLINES[Math.floor(Math.random()*HEADLINES.length)].replace(/{name}/g,G.name||'某爱豆')+'  ';
  }
  refresh();
  setInterval(refresh, 18000);
}

/* ==================== 开场创建 ==================== */
function renderIntro(){
  document.getElementById('app').innerHTML = `
  <div class="intro">
    <div class="logo">★ SUPERSTAR SIMULATOR ★</div>
    <h1>顶流之路</h1>
    <div class="sub">从练习生到神级偶像，或者一夜塌房糊穿地心。<br>你的每个选择，都在被亿万网友围观。</div>
    <div class="field">
      <label>艺名</label>
      <input id="inName" placeholder="给自己起个响亮的名字" maxlength="8" value="">
    </div>
    <div class="field">
      <label>性别 / 定位</label>
      <div class="gender-row">
        <div class="g" data-g="female" onclick="pickGender(this,'female','小姐姐')">女爱豆</div>
        <div class="g" data-g="male" onclick="pickGender(this,'male','小哥哥')">男爱豆</div>
        <div class="g" data-g="neutral" onclick="pickGender(this,'neutral','爱豆')">中性/自定</div>
      </div>
    </div>
    <div class="field">
      <label>出道人设</label>
      <div class="concept-grid">
        ${Object.entries(CONCEPTS).map(([k,v])=>`
          <div class="concept" data-c="${k}" onclick="pickConcept(this,'${k}','${v.label}')">
            <div class="cn">${v.label}</div>
            <div class="cd">${v.desc}</div>
          </div>`).join('')}
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">✦ 签约出道 ✦</button>
  </div>`;
}

function pickGender(el,g,lbl){
  document.querySelectorAll('.gender-row .g').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel'); G.gender=g; G.genderLabel=lbl;
}
function pickConcept(el,c,lbl){
  document.querySelectorAll('.concept').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel'); G.concept=c; G.conceptLabel=lbl;
}

function startGame(){
  const nm = document.getElementById('inName').value.trim();
  if(!nm){ toast('先起个艺名嘛！'); return; }
  if(!G.gender){ toast('选个性别定位~'); return; }
  if(!G.concept){ toast('选个出道人设~'); return; }
  G.name = nm;
  const b = CONCEPTS[G.concept].bonus;
  for(const k in b){ G[k]+=b[k]; }
  document.getElementById('fandomBtn').style.display='block';
  toast('🎉 '+G.name+' 正式出道！');
  renderMain();
}

/* ==================== 主界面 ==================== */
function renderMain(){
  if(G.gameover) return;
  const avatarEmoji = G.gender==='female'?'👩‍🎤':G.gender==='male'?'🧑‍🎤':'🎤';
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="hud">
    <div class="name-row">
      <div class="avatar">${avatarEmoji}</div>
      <div class="who">
        <h1>${G.name}</h1>
        <div class="tier">${TIERS[G.tier]} <b>· ${G.conceptLabel} · ${G.genderLabel}</b></div>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat fans"><div class="k">粉丝</div><div class="v">${fmtFans(G.fans)}</div></div>
    <div class="stat buzz"><div class="k">话题度</div><div class="v">${G.buzz}</div></div>
    <div class="stat rep"><div class="k">路人缘</div><div class="v">${G.rep}</div></div>
    <div class="stat money"><div class="k">资金</div><div class="v">${G.money}万</div></div>
  </div>
  <div class="bars">
    <div class="bar-line"><span class="lbl">心情</span><div class="bar-out"><div class="bar-in mood" style="width:${clamp(G.mood)}%"></div></div><span class="num">${G.mood}</span></div>
    <div class="bar-line"><span class="lbl">黑红值</span><div class="bar-out"><div class="bar-in black" style="width:${clamp(G.black)}%"></div></div><span class="num">${G.black}</span></div>
  </div>
  <div class="stage" id="stage">
    <div class="week-pill">📅 出道第 ${G.week} 周</div>
    <div id="content"></div>
  </div>`;
  showActions();
}

/* ==================== 行动菜单 ==================== */
function showActions(){
  const c = document.getElementById('content');
  const acts = getAvailableActions();
  c.innerHTML = `
    <div class="actions-title">本周安排 · 选一项</div>
    <div class="act-grid">
      ${acts.map((a,i)=>`
        <div class="act ${a.disabled?'disabled':''}" onclick="doAction(${i})">
          ${a.cost?`<div class="cost">${a.cost}</div>`:''}
          <div class="ico">${a.ico}</div>
          <div class="an">${a.name}</div>
          <div class="ad">${a.desc}</div>
        </div>`).join('')}
    </div>`;
  window._acts = acts;
}

function getAvailableActions(){
  const list = [];
  list.push({ico:'🎵',name:'录制打歌',desc:'发新歌冲榜，涨话题度和粉丝',key:'sing'});
  list.push({ico:'📱',name:'直播营业',desc:'和粉丝互动，稳固粉丝盘',key:'live'});
  list.push({ico:'📺',name:'上综艺',desc:'节目效果好圈路人，但耗心情',key:'variety'});
  list.push({ico:'💼',name:'接商务',desc:'代言赚钱，可能翻车',key:'biz',cost:'+钱'});
  if(G.tier>=2) list.push({ico:'🎬',name:'拍戏转型',desc:'影视资源，赌一把演技',key:'drama'});
  list.push({ico:'💤',name:'休整放空',desc:'恢复心情，但一周没产出',key:'rest'});
  list.push({ico:'🎲',name:'随缘一周',desc:'佛系营业，看命运安排',key:'random'});
  return list;
}

function doAction(i){
  const a = window._acts[i];
  const ev = resolveAction(a.key);
  currentEvent = ev;
  renderEvent(ev);
}

/* ==================== 行动 → 事件解析 ==================== */
function resolveAction(key){
  // 大部分行动有 65% 概率触发随机事件，否则直接结算
  const pool = EVENTS.filter(e=>{
    if(G.seenEvents.includes(e.id) && !e.repeat) return false;
    if(e.cond && !e.cond()) return false;
    if(e.trigger && !e.trigger.includes(key)) return false;
    return true;
  });
  if(pool.length && Math.random()<0.68){
    const ev = pick(pool);
    return ev;
  }

     {t:'委婉拒绝,划清界限',cs:'理智但凉薄',eff:{mood:-6,rep:-2},r:'你怕被连累拒绝了,老友默默走了,你心里不是滋味。'},
     {t:'合作出个双人舞台',cs:'共赢+话题',eff:{buzz:10,fans:15000,mood:6},r:'你俩合体舞台意外出圈,"神仙友情",双赢。'},
   ]},
];

/* ==================== 事件渲染 ==================== */
function renderEvent(ev){
  const c = document.getElementById('content');
  const desc = typeof ev.desc==='function'?ev.desc():ev.desc;
  c.innerHTML = `
    <div class="card">
      <span class="etag ${ev.tag}">${ev.tagLabel}</span>
      <h2>${ev.title}</h2>
      <div class="desc">${desc}</div>
      <div class="choices">
        ${ev.choices.map((ch,i)=>`
          <button class="choice" onclick="chooseOption(${i})">
            ${ch.t}
            <span class="cs">${ch.cs||''}</span>
          </button>`).join('')}
      </div>
    </div>`;
  document.getElementById('stage').scrollIntoView({behavior:'smooth',block:'start'});
}

function chooseOption(i){
  const ev = currentEvent;
  const ch = ev.choices[i];
  if(ev.id) G.seenEvents.push(ev.id);
  const before = snapshot();
  applyEffects(ch.eff);
  const deltas = calcDeltas(before);
  renderResult(ch, deltas);
}

function renderResult(ch, deltas){
  const c = document.getElementById('content');
  const chips = deltas.map(d=>`<span class="chip ${d.up?'up':'down'}">${d.label} ${d.up?'+':''}${d.val}</span>`).join('');
  c.innerHTML = `
    <div class="result">
      <div class="rtitle">📢 结果</div>
      <div class="deltas">${chips||'<span class="chip up">风平浪静</span>'}</div>
      <div class="rdesc">${ch.r}</div>
    </div>
    <button class="next-btn" onclick="nextWeek()">进入下一周 →</button>`;
  updateHUD();
}

/* ==================== 数值处理 ==================== */
function applyEffects(eff){
  if(!eff) return;
  for(const k in eff){ G[k] = (G[k]||0) + eff[k]; }
  G.fans = Math.max(0, G.fans);
  G.mood = clamp(G.mood); G.black = clamp(G.black);
  G.buzz = Math.max(0,G.buzz); G.rep = clamp(G.rep,0,100); G.money = Math.max(-35,G.money);
}
function snapshot(){ return {fans:G.fans,buzz:G.buzz,rep:G.rep,money:G.money,mood:G.mood,black:G.black}; }
function calcDeltas(before){
  const map = {fans:'粉丝',buzz:'话题',rep:'路人缘',money:'资金',mood:'心情',black:'黑红'};
  const out = [];
  for(const k in map){
    const d = G[k]-before[k];
    if(d!==0){
      let val = d, label = map[k];
      if(k==='fans') val = (d>0?'+':'')+fmtFans(Math.abs(d)) , val=(d>0?'':'-')+fmtFans(Math.abs(d));
      out.push({label, val:k==='fans'?(d>0?fmtFans(d):'-'+fmtFans(Math.abs(d))):(d>0?'+'+d:d), up:d>0, k});
    }
  }
  // fans 特殊格式修正
  return out.map(o=>{
    if(o.k==='fans'){ return {label:'粉丝', val:'', up:o.up, custom:(o.up?'+':'-')+fmtFans(Math.abs(G.fans-before.fans))}; }
    return o;
  }).map(o=> o.custom?{label:o.label,val:o.custom,up:o.up}:o);
}

function updateHUD(){
  const q=(s)=>document.querySelector(s);
  const s = document.querySelectorAll('.stat .v');
  if(s[0]) s[0].textContent=fmtFans(G.fans);
  if(s[1]) s[1].textContent=G.buzz;
  if(s[2]) s[2].textContent=G.rep;
  if(s[3]) s[3].textContent=G.money+'万';
  const bars = document.querySelectorAll('.bar-in');
  const nums = document.querySelectorAll('.bar-line .num');
  if(bars[0]){bars[0].style.width=clamp(G.mood)+'%'; nums[0].textContent=G.mood;}
  if(bars[1]){bars[1].style.width=clamp(G.black)+'%'; nums[1].textContent=G.black;}
}

/* ==================== 周推进 & 升咖 ==================== */
function nextWeek(){
  G.week++;
  // 每周自然变化
  G.buzz = Math.max(0, G.buzz-3);        // 话题度自然冷却
  G.black = Math.max(0, G.black-1);      // 黑红值缓慢消退
  G.money -= 1;                          // 团队运营开销
  G.mood = Math.max(0, G.mood-2);        // 疲惫累积
  // 咖位越高维护成本越高,但也带来被动涨粉
  if(G.tier>=3) G.money -= 1;
  if(G.rep>=60 && G.black<30) G.fans += Math.floor(G.fans*0.02); // 高口碑滚雪球
  checkTierUp();
  const end = checkEnding();
  if(end){ renderEnding(end); return; }
  renderMain();
}

function checkTierUp(){
  const thresholds = [ // 升级所需粉丝(人)
    {fans:50000,tier:1}, {fans:300000,tier:2}, {fans:1500000,tier:3},
    {fans:6000000,tier:4}, {fans:20000000,tier:5},
  ];
  for(const t of thresholds){
    if(G.fans>=t.fans && G.tier<t.tier){
      G.tier = t.tier;
      toast('🎊 咖位提升 → '+TIERS[G.tier]+'！');
    }
  }
}

/* ==================== 结局判定 ==================== */
function checkEnding(){
  // 塌房 / 糊掉
  if(G.black>=100){ return ENDINGS.collapse; }
  if(G.mood<=0){ return ENDINGS.breakdown; }
  if(G.fans<=0 && G.week>4){ return ENDINGS.flop; }
  if(G.money<=-30){ return ENDINGS.broke; }
  // 神级封神(极难:顶级咖位+高路人缘+高话题)
  if(G.tier>=5 && G.rep>=72 && G.black<40){ return ENDINGS.legend; }
  // 30周长线结局
  if(G.week>30){
    if(G.black>=55) return ENDINGS.blackred;
    if(G.tier>=4) return ENDINGS.toplux;
    if(G.rep>=75) return ENDINGS.artist;
    return ENDINGS.steady;
  }
  return null;
}

function renderEnding(end){
  G.gameover = true;
  document.getElementById('fandomBtn').style.display='none';

    <div class="em">${end.em}</div>

      <div class="fstat"><div class="fk">最终粉丝</div><div class="fv">${fmtFans(G.fans)}</div></div>
      <div class="fstat"><div class="fk">咖位</div><div class="fv">${TIERS[G.tier]}</div></div>
      <div class="fstat"><div class="fk">存活周数</div><div class="fv">${G.week}周</div></div>
      <div class="fstat"><div class="fk">黑红值</div><div class="fv">${G.black}</div></div>
    </div>
    <button class="start-btn" onclick="location.reload()">✦ 再战一次 ✦</button>
  </div>`;
  window.scrollTo(0,0);
}

function closeModal(){ document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });

/* ==================== 工具函数 ==================== */
function fmtFans(n){
  n = Math.round(Math.max(0,n));
  if(n>=100000000) return (n/100000000).toFixed(2)+'亿';
  if(n>=10000) return (n/10000).toFixed(n>=1000000?0:1).replace(/\.0$/,'')+'万';
  return n.toLocaleString();
}
function clamp(v,min=0,max=100){ return Math.max(min,Math.min(max,v)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('on'),2200);
}
