<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>词过 · FREE高考2050</title>
<style>
  :root{
    --ink:#1c1c1a;
    --paper:#f6f4ee;
    --paper2:#eeece3;
    --line:#d8d4c6;
    --accent:#3b5c4d;
    --accent2:#8a6d3b;
    --muted:#8a8677;
    --danger:#a64b3f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    background:var(--paper);
    color:var(--ink);
    overflow-x:hidden;
  }
  .app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px 10px;
  }
  .brand{
    font-size:13px;
    letter-spacing:0.12em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .brand b{color:var(--ink); font-weight:700;}
  .tabbar{
    display:flex;
    gap:6px;
  }
  .tabbtn{
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    font-size:12px;
    padding:6px 10px;
    border-radius:999px;
    cursor:pointer;
  }
  .tabbtn.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  /* ---------- views ---------- */
  .view{ display:none; flex:1; flex-direction:column; padding:0 18px 24px; }
  .view.active{ display:flex; }

  /* ---------- setup / home ---------- */
  .card{
    background:var(--paper2);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    margin-bottom:14px;
  }
  .card h2{
    margin:0 0 12px;
    font-size:15px;
    color:var(--accent);
    letter-spacing:0.02em;
  }
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .stat{
    text-align:center;
  }
  .stat .num{
    font-size:22px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .stat .lbl{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }
  .progress-track{
    height:8px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
    margin-top:14px;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    color:var(--muted);
    margin-top:8px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:14px;
  }
  .field label{
    font-size:12px;
    color:var(--muted);
  }
  .field input, .field select{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    padding:10px 12px;
    font-size:15px;
    color:var(--ink);
    font-family:inherit;
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--accent);
  }

  .btn{
    display:block;
    width:100%;
    text-align:center;
    padding:14px;
    border-radius:14px;
    border:none;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{
    background:var(--ink);
    color:var(--paper);
  }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink);
  }
  .btn-danger{
    background:transparent;
    border:1px solid var(--danger);
    color:var(--danger);
  }
  .btn + .btn{ margin-top:10px; }

  /* ---------- study screen ---------- */
  .study-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:6px 2px 2px;
    font-size:12px;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .study-progress-track{
    height:4px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
    margin:8px 2px 0;
  }
  .study-progress-fill{
    height:100%;
    background:var(--accent2);
    width:0%;
    transition:width .25s ease;
  }

  .card-zone{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px 0;
  }
  .flashcard{
    width:100%;
    aspect-ratio: 4/5;
    max-height:60vh;
    background:linear-gradient(160deg,#fbfaf6,#f0ede4);
    border:1px solid var(--line);
    border-radius:26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px;
    cursor:pointer;
    user-select:none;
    position:relative;
    box-shadow:0 1px 0 rgba(0,0,0,0.02), 0 12px 30px -18px rgba(0,0,0,0.25);
  }
  .flashcard:active{
    transform:scale(0.985);
  }
  .fc-index{
    position:absolute;
    top:18px;
    left:22px;
    font-size:12px;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .fc-freq{
    position:absolute;
    top:18px;
    right:22px;
    font-size:11px;
    color:var(--muted);
    background:var(--paper2);
    padding:3px 9px;
    border-radius:99px;
    border:1px solid var(--line);
  }
  .fc-word{
    font-size:clamp(32px, 9vw, 46px);
    font-weight:700;
    color:var(--ink);
    text-align:center;
    line-height:1.15;
    word-break:break-word;
  }
  .fc-hint{
    margin-top:22px;
    font-size:13px;
    color:var(--muted);
  }
  .fc-meaning{
    margin-top:22px;
    font-size:22px;
    color:var(--accent);
    font-weight:600;
    text-align:center;
    opacity:0;
    transform:translateY(4px);
    transition:opacity .18s ease, transform .18s ease;
  }
  .fc-meaning.show{
    opacity:1;
    transform:translateY(0);
  }
  .fc-tap-tip{
    position:absolute;
    bottom:16px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.02em;
  }

  .study-controls{
    display:flex;
    gap:10px;
    padding-top:6px;
  }
  .study-controls .btn{ flex:1; }

  /* ---------- stats view ---------- */
  .roundlist{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .roundrow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--paper2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 14px;
    font-size:13px;
  }
  .roundrow .rnum{
    font-weight:700;
    color:var(--accent);
    min-width:42px;
  }
  .roundrow .rtime{
    color:var(--muted);
    font-size:12px;
    text-align:right;
  }
  .empty-tip{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:30px 10px;
  }

  /* ---------- done overlay ---------- */
  .done-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    flex:1;
    padding:20px;
  }
  .done-wrap .big{
    font-size:40px;
    margin-bottom:6px;
  }
  .done-wrap h3{
    margin:0 0 6px;
    font-size:20px;
  }
  .done-wrap p{
    margin:0 0 22px;
    color:var(--muted);
    font-size:14px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">词过 · <b>FREE 2050</b></div>
    <div class="tabbar">
      <button class="tabbtn active" data-tab="home">主页</button>
      <button class="tabbtn" data-tab="stats">统计</button>
    </div>
  </div>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">

    <div class="card">
      <h2>今日进度</h2>
      <div class="stat-grid">
        <div class="stat"><div class="num" id="s-today">0</div><div class="lbl">今天已过</div></div>
        <div class="stat"><div class="num" id="s-target">--</div><div class="lbl">今日目标</div></div>
        <div class="stat"><div class="num" id="s-round">--</div><div class="lbl">当前轮次</div></div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="round-progress"></div></div>
      <div class="row">
        <span id="round-progress-text">本轮 0 / 2050</span>
        <span id="round-percent">0%</span>
      </div>
    </div>

    <div class="card" id="plan-card">
      <h2>学习计划</h2>
      <div class="field">
        <label>计划多少天过完一轮（2050词）</label>
        <input type="number" id="plan-days" min="1" value="14" inputmode="numeric">
      </div>
      <div class="row" style="margin-top:-4px; margin-bottom:6px;">
        <span>按此计划，每天需背</span>
        <span id="plan-perday" style="color:var(--ink); font-weight:700;">147 词</span>
      </div>
      <button class="btn btn-primary" id="btn-save-plan">保存计划</button>
    </div>

    <div class="card">
      <h2>开始 / 继续</h2>
      <button class="btn btn-primary" id="btn-start">开始背词 →</button>
      <button class="btn btn-ghost" id="btn-reset-round">提前结束本轮，重新开一轮</button>
    </div>

  </div>

  <!-- STUDY VIEW -->
  <div class="view" id="view-study">
    <div class="study-header">
      <span id="study-round-label">第 1 轮</span>
      <span id="study-count-label">0 / 2050</span>
    </div>
    <div class="study-progress-track"><div class="study-progress-fill" id="study-progress-fill"></div></div>

    <div class="card-zone">
      <div class="flashcard" id="flashcard">
        <div class="fc-index" id="fc-index">#1</div>
        <div class="fc-freq" id="fc-freq">词频 --</div>
        <div class="fc-word" id="fc-word">word</div>
        <div class="fc-hint" id="fc-hint">点一下看中文意思</div>
        <div class="fc-meaning" id="fc-meaning"></div>
        <div class="fc-tap-tip">再点一下 → 下一个</div>
      </div>
    </div>

    <div class="study-controls">
      <button class="btn btn-ghost" id="btn-back-home">‹ 暂停</button>
      <button class="btn btn-primary" id="btn-next">下一个 →</button>
    </div>
  </div>

  <!-- ROUND DONE VIEW -->
  <div class="view" id="view-done">
    <div class="done-wrap">
      <div class="big">🎉</div>
      <h3>本轮已过完！</h3>
      <p id="done-summary">第 1 轮 · 用时 --</p>
      <button class="btn btn-primary" id="btn-start-new-round" style="max-width:280px;">开始新一轮 →</button>
      <button class="btn btn-ghost" id="btn-done-home" style="max-width:280px;">返回主页</button>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div class="view" id="view-stats">
    <div class="card">
      <h2>总览</h2>
      <div class="stat-grid">
        <div class="stat"><div class="num" id="st-rounds">0</div><div class="lbl">完成轮次</div></div>
        <div class="stat"><div class="num" id="st-total">0</div><div class="lbl">累计过词</div></div>
        <div class="stat"><div class="num" id="st-days">0</div><div class="lbl">学习天数</div></div>
      </div>
    </div>
    <div class="card" style="flex:1;">
      <h2>轮次记录</h2>
      <div class="roundlist" id="round-history"></div>
    </div>
    <button class="btn btn-danger" id="btn-clear-all">清空所有数据</button>
  </div>

</div>

      [arr[i],arr[j]]=[arr[j],arr[i]];
    }

  const planDaysInput = document.getElementById("plan-days");
  const planPerDay = document.getElementById("plan-perday");

  function computePerDay(){
    const days = Math.max(1, parseInt(planDaysInput.value || "14", 10));
    return Math.ceil(TOTAL / days);
  }

  function renderHome(){
    elToday.textContent = state.todayCount;
    elTarget.textContent = computePerDay();
    elRound.textContent = state.currentRound;
    const pct = Math.round((state.roundPos / TOTAL) * 100);
    elRoundProgress.style.width = pct + "%";
    elRoundProgressText.textContent = "本轮 " + state.roundPos + " / " + TOTAL;
    elRoundPercent.textContent = pct + "%";
    planDaysInput.value = state.planDays;
  }

  planDaysInput.addEventListener("input", ()=>{
    planPerDay.textContent = computePerDay() + " 词";
  });

  document.getElementById("btn-save-plan").addEventListener("click", ()=>{
    state.planDays = Math.max(1, parseInt(planDaysInput.value||"14",10));
    save();
    renderHome();
  });

  document.getElementById("btn-reset-round").addEventListener("click", ()=>{
    if(!confirm("确定要放弃当前这轮进度，重新开一轮吗？")) return;
    startNewRound(false);
  });

  document.getElementById("btn-start").addEventListener("click", ()=>{
    enterStudy();
  });

  // init per-day display
  planPerDay.textContent = computePerDay() + " 词";

  // ---------------- study logic ----------------
  const viewStudy = document.getElementById("view-study");
  const viewDone = document.getElementById("view-done");
  const flashcard = document.getElementById("flashcard");
  const fcIndex = document.getElementById("fc-index");
  const fcFreqEl = document.getElementById("fc-freq");
  const fcWord = document.getElementById("fc-word");
  const fcMeaning = document.getElementById("fc-meaning");
  const fcHint = document.getElementById("fc-hint");
  const studyRoundLabel = document.getElementById("study-round-label");
  const studyCountLabel = document.getElementById("study-count-label");
  const studyProgressFill = document.getElementById("study-progress-fill");

  let revealed = false;

  function currentWord(){
    const idx = state.roundOrder[state.roundPos];
    return WORDS[idx];
  }

  function renderCard(){
    if(state.roundPos >= TOTAL){
      finishRound();
      return;
    }
    const w = currentWord();
    fcIndex.textContent = "#" + (state.roundPos + 1);
    fcFreqEl.textContent = "序号 " + w.id;
    fcWord.textContent = w.word;
    fcMeaning.textContent = w.meaning;
    fcMeaning.classList.remove("show");
    fcHint.style.display = "block";
    revealed = false;

    studyRoundLabel.textContent = "第 " + state.currentRound + " 轮";
    studyCountLabel.textContent = state.roundPos + " / " + TOTAL;
    studyProgressFill.style.width = Math.round((state.roundPos/TOTAL)*100) + "%";
  }

  function revealMeaning(){
    revealed = true;
    fcMeaning.classList.add("show");
    fcHint.style.display = "none";
  }

  function advance(){
    if(!revealed){
      revealMeaning();
      return;
    }
    // move to next word
    state.roundPos += 1;
    state.todayCount += 1;
    state.totalEverShown += 1;
    save();
    renderCard();
    renderHome();
  }

  flashcard.addEventListener("click", advance);
  document.getElementById("btn-next").addEventListener("click", advance);

  document.getElementById("btn-back-home").addEventListener("click", ()=>{
    save();
    tabs.forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-tab="home"]').classList.add("active");
    showOnly(document.getElementById("view-home"));
    renderHome();
  });

  function enterStudy(){
    if(!state.roundStartTime) state.roundStartTime = Date.now();
    showOnly(viewStudy);
    renderCard();
  }

  function fmtDuration(ms){
    const totalMin = Math.round(ms/60000);
    if(totalMin < 60) return totalMin + " 分钟";
    const h = Math.floor(totalMin/60);
    const m = totalMin % 60;
    return h + " 小时 " + m + " 分钟";
  }
  function fmtTime(ts){
    const d = new Date(ts);
    const pad = n => n.toString().padStart(2,"0");
    return (d.getMonth()+1)+"/"+d.getDate()+" "+pad(d.getHours())+":"+pad(d.getMinutes());
  }

  function finishRound(){
    const endTime = Date.now();
    const durationMs = endTime - state.roundStartTime;
    state.history.push({
      round: state.currentRound,
      start: state.roundStartTime,
      end: endTime,
      durationMs: durationMs
    });
    save();

    document.getElementById("done-summary").textContent =
      "第 " + state.currentRound + " 轮 · 用时 " + fmtDuration(durationMs) +
      " · " + fmtTime(state.roundStartTime) + " → " + fmtTime(endTime);

    showOnly(viewDone);
  }

  document.getElementById("btn-start-new-round").addEventListener("click", ()=>{
    startNewRound(true);
    showOnly(viewStudy);
    renderCard();
  });
  document.getElementById("btn-done-home").addEventListener("click", ()=>{
    startNewRound(true);
    tabs.forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-tab="home"]').classList.add("active");
    showOnly(document.getElementById("view-home"));
    renderHome();
  });

  function startNewRound(incrementRoundNumber){
    if(incrementRoundNumber) state.currentRound += 1;
    state.roundOrder = shuffleIndices(TOTAL);
    state.roundPos = 0;
    state.roundStartTime = Date.now();
    save();
    renderHome();
  }

  // ---------------- stats view ----------------
  function renderStats(){
    document.getElementById("st-rounds").textContent = state.history.length;
    document.getElementById("st-total").textContent = state.totalEverShown;
    const uniqueDays = new Set(state.history.map(h=>{
      const d = new Date(h.start);
      return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();
    }));
    // fallback: just count distinct calendar days across history + today
    document.getElementById("st-days").textContent = Math.max(uniqueDays.size, state.todayCount>0?1:0);

    const list = document.getElementById("round-history");
    list.innerHTML = "";
    if(state.history.length === 0){
      list.innerHTML = '<div class="empty-tip">还没有完成过一轮，加油背完第一轮吧 💪</div>';
      return;
    }
    state.history.slice().reverse().forEach(h=>{
      const row = document.createElement("div");
      row.className = "roundrow";
      row.innerHTML =
        '<div class="rnum">第' + h.round + '轮</div>' +
        '<div class="rtime">' + fmtTime(h.start) + ' → ' + fmtTime(h.end) +
        '<br>用时 ' + fmtDuration(h.durationMs) + '</div>';
      list.appendChild(row);
    });
  }

  document.getElementById("btn-clear-all").addEventListener("click", ()=>{
    if(!confirm("确定要清空所有学习记录吗？此操作不可恢复。")) return;
    localStorage.removeItem(LS_KEY);
    state = defaultState();
    save();
    renderHome();
    renderStats();
  });

  // ---------------- init ----------------
  renderHome();
})();
</script>
</body>
</html>
